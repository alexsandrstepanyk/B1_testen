<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch B1 Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root{--bg:#0d0e14;--surface:#161820;--card:#1e2030;--border:#2a2d40;--accent:#f5a623;--accent2:#e8490f;--correct:#2ecc71;--wrong:#e74c3c;--text:#f0f0f5;--muted:#7a7d9a;--radius:14px;}
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,#f5a62318 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,#e8490f12 0%,transparent 50%);pointer-events:none;}
  #app{width:100%;max-width:600px;padding:20px;position:relative;z-index:1;}
  .screen{display:none;}.screen.active{display:block;animation:fadeUp .4s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
  .logo-flag{font-size:64px;text-align:center;margin-bottom:10px;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(38px,9vw,60px);text-align:center;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
  .subtitle{text-align:center;color:var(--muted);margin:8px 0 22px;font-size:14px;}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;margin-bottom:22px;}
  .stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px;text-align:center;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:32px;color:var(--accent);}
  .stat-label{font-size:11px;color:var(--muted);}
  .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:12px;}
  .btn-mode{background:var(--card);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text);transition:border-color .2s,background .2s;text-align:center;line-height:1.4;}
  .btn-mode:hover{border-color:var(--accent);background:#f5a62312;}
  .btn-mode .mi{font-size:20px;display:block;margin-bottom:4px;}
  .cat-grid{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:12px;}
  .btn-cat{background:var(--surface);border:1.5px solid var(--border);border-radius:10px;padding:10px 6px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:12px;font-weight:500;color:var(--muted);transition:all .2s;text-align:center;}
  .btn-cat:hover,.btn-cat.active{border-color:var(--accent);color:var(--accent);background:#f5a62310;}
  .section-label{font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--muted);margin:16px 0 8px;}
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .quiz-counter{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);}
  .quiz-score{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .score-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .progress-bar{width:100%;height:4px;background:var(--border);border-radius:999px;margin-bottom:18px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;transition:width .4s ease;}
  .category-badge{display:inline-block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent);background:#f5a62318;border:1px solid #f5a62340;border-radius:999px;padding:4px 12px;margin-bottom:12px;}
  .question-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:24px 22px 20px;margin-bottom:14px;}
  .question-de{font-size:20px;font-weight:600;line-height:1.4;margin-bottom:10px;}
  .question-ua{font-size:13px;color:var(--muted);font-style:italic;}
  .options{display:flex;flex-direction:column;gap:8px;}
  .option{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:14px 18px;cursor:pointer;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);text-align:left;transition:border-color .2s,background .2s,transform .12s;display:flex;align-items:center;gap:12px;}
  .opt-letter{width:28px;height:28px;border-radius:8px;background:var(--border);display:flex;align-items:center;justify-content:center;font-size:12px;font-weight:700;color:var(--muted);flex-shrink:0;transition:background .2s,color .2s;}
  .option:hover:not(:disabled){border-color:var(--accent);transform:translateX(3px);}
  .option:hover:not(:disabled) .opt-letter{background:var(--accent);color:#fff;}
  .option.correct{border-color:var(--correct);background:#2ecc7115;animation:bounceIn .3s ease;}
  .option.correct .opt-letter{background:var(--correct);color:#fff;}
  .option.wrong{border-color:var(--wrong);background:#e74c3c12;animation:shake .3s ease;}
  .option.wrong .opt-letter{background:var(--wrong);color:#fff;}
  .option:disabled{cursor:default;}
  @keyframes bounceIn{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-5px)}75%{transform:translateX(5px)}}
  .feedback-bar{border-radius:var(--radius);padding:12px 16px;font-size:14px;font-weight:500;margin-bottom:12px;display:none;}
  .feedback-bar.show{display:block;animation:fadeUp .3s ease;}
  .feedback-bar.correct-fb{background:#2ecc7115;border:1px solid #2ecc7140;color:#2ecc71;}
  .feedback-bar.wrong-fb{background:#e74c3c15;border:1px solid #e74c3c40;color:#e87070;}
  .next-btn{display:none;width:100%;padding:16px;border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 6px 24px #f5a62335;}
  .next-btn.show{display:block;}
  .result-ring{width:130px;height:130px;border-radius:50%;border:6px solid var(--border);margin:0 auto 20px;position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column;}
  .result-ring::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:6px solid transparent;border-top-color:var(--accent);border-right-color:var(--accent2);animation:spin 1.5s ease forwards;}
  @keyframes spin{from{transform:rotate(-90deg);opacity:0}to{transform:rotate(270deg);opacity:1}}
  .result-pct{font-family:'Bebas Neue',sans-serif;font-size:44px;color:var(--accent);line-height:1;}
  .result-label{font-size:11px;color:var(--muted);}
  h2{font-family:'Bebas Neue',sans-serif;font-size:32px;text-align:center;margin-bottom:6px;letter-spacing:1px;}
  .result-msg{text-align:center;color:var(--muted);margin-bottom:22px;font-size:14px;}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:20px;}
  .result-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px;text-align:center;}
  .result-box-num{font-family:'Bebas Neue',sans-serif;font-size:30px;}
  .result-box-num.green{color:var(--correct);}
  .result-box-num.red{color:var(--wrong);}
  .result-box-label{font-size:11px;color:var(--muted);}
</style>
</head>
<body>
<div id="app">

  <!-- START -->
  <div class="screen active" id="startScreen">
    <div class="logo-flag">🇩🇪</div>
    <h1>DEUTSCH B1 QUIZ</h1>
    <p class="subtitle">500+ питань · 10 тем · Побутові фрази рівня B1</p>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num" id="totalQCount">500+</div><div class="stat-label">Питань</div></div>
      <div class="stat-box"><div class="stat-num">10</div><div class="stat-label">Тем</div></div>
      <div class="stat-box"><div class="stat-num">B1</div><div class="stat-label">Рівень</div></div>
    </div>
    <div class="section-label">Режим гри</div>
    <div class="mode-grid">
      <button class="btn-mode" onclick="startQuiz(20,'all')"><span class="mi">⚡</span>Швидкий<br><small>20 питань</small></button>
      <button class="btn-mode" onclick="startQuiz(50,'all')"><span class="mi">🎯</span>Тренування<br><small>50 питань</small></button>
      <button class="btn-mode" onclick="startQuiz(100,'all')"><span class="mi">📚</span>Серйозний<br><small>100 питань</small></button>
      <button class="btn-mode" onclick="startQuiz(0,'all')"><span class="mi">🏆</span>Повний марафон<br><small>всі питання</small></button>
    </div>
    <div class="section-label">Або обери тему</div>
    <div class="cat-grid" id="catGrid"></div>
  </div>

  <!-- QUIZ -->
  <div class="screen" id="quizScreen">
    <div class="quiz-header">
      <div class="quiz-counter" id="counter">01/20</div>
      <div class="quiz-score"><div class="score-dot"></div><span id="scoreDisplay">0 правильно</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="category-badge" id="categoryBadge">...</div>
    <div class="question-card">
      <div class="question-de" id="questionDE">...</div>
      <div class="question-ua" id="questionUA">...</div>
    </div>
    <div class="options" id="optionsContainer"></div>
    <div class="feedback-bar" id="feedbackBar"></div>
    <button class="next-btn" id="nextBtn" onclick="nextQuestion()">Далі →</button>
  </div>

  <!-- RESULTS -->
  <div class="screen" id="resultsScreen">
    <div class="result-ring">
      <div class="result-pct" id="resultPct">0%</div>
      <div class="result-label">результат</div>
    </div>
    <h2 id="resultTitle">РЕЗУЛЬТАТ</h2>
    <p class="result-msg" id="resultMsg">...</p>
    <div class="result-grid">
      <div class="result-box"><div class="result-box-num green" id="correctCount">0</div><div class="result-box-label">✅ Правильно</div></div>
      <div class="result-box"><div class="result-box-num red" id="wrongCount">0</div><div class="result-box-label">❌ Неправильно</div></div>
    </div>
    <div class="mode-grid">
      <button class="btn-mode" onclick="startQuiz(20,'all')"><span class="mi">⚡</span>Знову<br><small>20 питань</small></button>
      <button class="btn-mode" onclick="startQuiz(50,'all')"><span class="mi">🎯</span>Знову<br><small>50 питань</small></button>
      <button class="btn-mode" onclick="startQuiz(100,'all')"><span class="mi">📚</span>Знову<br><small>100 питань</small></button>
      <button class="btn-mode" onclick="showScreen('startScreen')"><span class="mi">🏠</span>Головна<br><small>обрати тему</small></button>
    </div>
  </div>
</div>

<script>
// ─────────────────────────────────────────────
// БАНК ПИТАНЬ
// Формат: {cat, de, ua, opts:[неправильна, правильна, неправильна], ans: індекс правильної (0,1,2)}

// ─────────────────────────────────────────────
const RAW = [

// ══════════════════════════════════════════════
// 1. ДІЄСЛОВА

// ─────────────────────────────────────────────
// INIT
// ─────────────────────────────────────────────
const CATS = [...new Set(RAW.map(q=>q.cat))];
let questions=[], current=0, score=0, answered=false;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

// Render category buttons
function buildCatGrid(){
  const grid=document.getElementById('catGrid');
  document.getElementById('totalQCount').textContent=RAW.length+'+';
  CATS.forEach(cat=>{
    const btn=document.createElement('button');
    btn.className='btn-cat';
    btn.textContent=cat;
    btn.onclick=()=>startQuiz(30,cat);
    grid.appendChild(btn);
  });
}
buildCatGrid();

function startQuiz(n, cat){
  let pool = cat==='all' ? RAW : RAW.filter(q=>q.cat===cat);
  pool=shuffle(pool);
  questions = n>0 ? pool.slice(0,Math.min(n,pool.length)) : pool;
  current=0; score=0;
  showScreen('quizScreen');
  renderQuestion();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion(){
  const q=questions[current], total=questions.length;
  document.getElementById('counter').textContent=String(current+1).padStart(2,'0')+'/'+String(total).padStart(2,'0');
  document.getElementById('scoreDisplay').textContent=score+' правильно';
  document.getElementById('progressFill').style.width=((current/total)*100)+'%';
  document.getElementById('categoryBadge').textContent=q.cat;
  document.getElementById('questionDE').textContent=q.de;
  document.getElementById('questionUA').textContent='('+q.ua+')';

  // Перемішуємо відповіді
  const shuffledOpts = shuffle([...q.opts]);
  const labels=['A','B','C'];
  const container=document.getElementById('optionsContainer');
  container.innerHTML='';
  shuffledOpts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option';
    btn.dataset.val=opt;
    btn.innerHTML=`<div class="opt-letter">${labels[i]}</div><span>${opt}</span>`;
    btn.onclick=()=>selectAnswer(opt, q.cor);
    container.appendChild(btn);
  });

  document.getElementById('feedbackBar').className='feedback-bar';
  document.getElementById('feedbackBar').textContent='';
  document.getElementById('nextBtn').className='next-btn';
  answered=false;
}

function selectAnswer(chosen, correct){
  if(answered)return;
  answered=true;
  const opts=document.querySelectorAll('.option');
  opts.forEach(btn=>{
    btn.disabled=true;
    if(btn.dataset.val===correct) btn.classList.add('correct');
    if(btn.dataset.val===chosen && chosen!==correct) btn.classList.add('wrong');
  });
  const feedback=document.getElementById('feedbackBar');
  if(chosen===correct){
    score++;
    feedback.textContent='✅ Чудово! Правильно!';
    feedback.className='feedback-bar show correct-fb';
  } else {
    feedback.textContent='❌ Неправильно! Правильна відповідь: '+correct;
    feedback.className='feedback-bar show wrong-fb';
  }
  document.getElementById('scoreDisplay').textContent=score+' правильно';
  document.getElementById('nextBtn').className='next-btn show';
}

function nextQuestion(){
  current++;
  if(current>=questions.length) showResults();
  else renderQuestion();
}

function showResults(){
  const total=questions.length, pct=Math.round((score/total)*100);
  document.getElementById('resultPct').textContent=pct+'%';
  document.getElementById('correctCount').textContent=score;
  document.getElementById('wrongCount').textContent=total-score;
  let title,msg;
  if(pct>=90){title='AUSGEZEICHNET! 🏆';msg='Відмінно! Ти готовий до іспиту B1!';}
  else if(pct>=75){title='SEHR GUT! 🌟';msg='Дуже добре! Ще трохи практики — і ти готовий!';}
  else if(pct>=60){title='GUT! 👍';msg='Непогано! Продовжуй вправлятися.';}
  else if(pct>=40){title='WEITER SO! 💪';msg='Є над чим попрацювати. Не здавайся!';}
  else {title='ÜBEN! 📚';msg='Треба більше практики. Ти зможеш!';}
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultMsg').textContent=msg+` (${score} з ${total} питань)`;
  showScreen('resultsScreen');
}
</script>
