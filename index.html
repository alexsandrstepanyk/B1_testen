<!DOCTYPE html>
<html lang="uk">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Deutsch B1 Quiz</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  :root {
    --bg:#0d0e14;--surface:#161820;--card:#1e2030;--border:#2a2d40;
    --accent:#f5a623;--accent2:#e8490f;--correct:#2ecc71;--wrong:#e74c3c;
    --text:#f0f0f5;--muted:#7a7d9a;--radius:14px;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;display:flex;align-items:center;justify-content:center;overflow:hidden;}
  body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse at 20% 20%,#f5a62318 0%,transparent 50%),radial-gradient(ellipse at 80% 80%,#e8490f12 0%,transparent 50%);pointer-events:none;}
  #app{width:100%;max-width:580px;padding:20px;position:relative;z-index:1;}
  .screen{display:none;} .screen.active{display:block;animation:fadeUp .4s ease;}
  @keyframes fadeUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:translateY(0)}}
  .logo-flag{font-size:72px;text-align:center;margin-bottom:12px;animation:pulse 2s ease-in-out infinite;}
  @keyframes pulse{0%,100%{transform:scale(1)}50%{transform:scale(1.06)}}
  h1{font-family:'Bebas Neue',sans-serif;font-size:clamp(42px,10vw,64px);text-align:center;letter-spacing:2px;background:linear-gradient(135deg,var(--accent),var(--accent2));-webkit-background-clip:text;-webkit-text-fill-color:transparent;background-clip:text;line-height:1.1;}
  .subtitle{text-align:center;color:var(--muted);margin:10px 0 28px;font-size:15px;}
  .stats-row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:28px;}
  .stat-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:18px 12px;text-align:center;}
  .stat-num{font-family:'Bebas Neue',sans-serif;font-size:36px;color:var(--accent);}
  .stat-label{font-size:12px;color:var(--muted);}
  .mode-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;margin-bottom:14px;}
  .btn{width:100%;padding:16px;border:none;border-radius:var(--radius);font-family:'DM Sans',sans-serif;font-size:16px;font-weight:600;cursor:pointer;transition:transform .15s,box-shadow .15s;letter-spacing:.5px;}
  .btn:active{transform:scale(.97);}
  .btn-primary{background:linear-gradient(135deg,var(--accent),var(--accent2));color:#fff;box-shadow:0 8px 32px #f5a62340;}
  .btn-primary:hover{box-shadow:0 12px 40px #f5a62360;}
  .btn-secondary{background:var(--card);border:1px solid var(--border);color:var(--text);margin-top:10px;}
  .btn-mode{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:14px 10px;cursor:pointer;font-family:'DM Sans',sans-serif;font-size:13px;font-weight:500;color:var(--text);transition:border-color .2s,background .2s;text-align:center;line-height:1.4;}
  .btn-mode:hover{border-color:var(--accent);background:#f5a62310;}
  .btn-mode .mode-icon{font-size:22px;display:block;margin-bottom:4px;}
  .quiz-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px;}
  .quiz-counter{font-family:'Bebas Neue',sans-serif;font-size:22px;color:var(--accent);}
  .quiz-score{font-size:13px;color:var(--muted);display:flex;align-items:center;gap:6px;}
  .score-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);}
  .progress-bar{width:100%;height:4px;background:var(--border);border-radius:999px;margin-bottom:20px;overflow:hidden;}
  .progress-fill{height:100%;background:linear-gradient(90deg,var(--accent),var(--accent2));border-radius:999px;transition:width .4s ease;}
  .category-badge{display:inline-block;font-size:11px;font-weight:600;letter-spacing:1px;text-transform:uppercase;color:var(--accent);background:#f5a62318;border:1px solid #f5a62340;border-radius:999px;padding:4px 12px;margin-bottom:12px;}
  .question-card{background:var(--card);border:1px solid var(--border);border-radius:18px;padding:26px 22px 22px;margin-bottom:16px;}
  .question-de{font-size:21px;font-weight:600;line-height:1.4;margin-bottom:10px;}
  .question-ua{font-size:14px;color:var(--muted);font-style:italic;}
  .options{display:flex;flex-direction:column;gap:9px;}
  .option{background:var(--surface);border:1.5px solid var(--border);border-radius:var(--radius);padding:15px 18px;cursor:pointer;font-size:15px;font-family:'DM Sans',sans-serif;color:var(--text);text-align:left;transition:border-color .2s,background .2s,transform .15s;position:relative;overflow:hidden;}
  .option::before{content:'';position:absolute;inset:0;background:linear-gradient(135deg,var(--accent),var(--accent2));opacity:0;transition:opacity .2s;}
  .option:hover:not(:disabled){border-color:var(--accent);transform:translateX(4px);}
  .option:hover:not(:disabled)::before{opacity:.05;}
  .option span{position:relative;z-index:1;}
  .option.correct{border-color:var(--correct);background:#2ecc7120;animation:bounceIn .3s ease;}
  .option.wrong{border-color:var(--wrong);background:#e74c3c18;animation:shake .3s ease;}
  .option:disabled{cursor:default;}
  @keyframes bounceIn{0%{transform:scale(1)}50%{transform:scale(1.02)}100%{transform:scale(1)}}
  @keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-6px)}75%{transform:translateX(6px)}}
  .feedback-bar{border-radius:var(--radius);padding:13px 16px;font-size:14px;font-weight:500;margin-bottom:14px;display:none;animation:fadeUp .3s ease;}
  .feedback-bar.show{display:block;}
  .feedback-bar.correct-fb{background:#2ecc7118;border:1px solid #2ecc7140;color:#2ecc71;}
  .feedback-bar.wrong-fb{background:#e74c3c18;border:1px solid #e74c3c40;color:#e87070;}
  .next-btn{display:none;width:100%;}
  .next-btn.show{display:block;}
  .result-ring{width:140px;height:140px;border-radius:50%;border:6px solid var(--border);margin:0 auto 22px;position:relative;display:flex;align-items:center;justify-content:center;flex-direction:column;}
  .result-ring::after{content:'';position:absolute;inset:-6px;border-radius:50%;border:6px solid transparent;border-top-color:var(--accent);border-right-color:var(--accent2);animation:spin 1.5s ease forwards;}
  @keyframes spin{from{transform:rotate(-90deg);opacity:0}to{transform:rotate(270deg);opacity:1}}
  .result-pct{font-family:'Bebas Neue',sans-serif;font-size:48px;color:var(--accent);line-height:1;}
  .result-label{font-size:12px;color:var(--muted);}
  h2{font-family:'Bebas Neue',sans-serif;font-size:34px;text-align:center;margin-bottom:8px;letter-spacing:1px;}
  .result-msg{text-align:center;color:var(--muted);margin-bottom:24px;font-size:15px;}
  .result-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:24px;}
  .result-box{background:var(--card);border:1px solid var(--border);border-radius:var(--radius);padding:16px;text-align:center;}
  .result-box-num{font-family:'Bebas Neue',sans-serif;font-size:32px;}
  .result-box-num.green{color:var(--correct);}
  .result-box-num.red{color:var(--wrong);}
  .result-box-label{font-size:12px;color:var(--muted);}
</style>
</head>
<body>
<div id="app">
  <div class="screen active" id="startScreen">
    <div class="logo-flag">🇩🇪</div>
    <h1>DEUTSCH B1 QUIZ</h1>
    <p class="subtitle">300 питань · Підготовка до іспиту B1 · Побутові фрази</p>
    <div class="stats-row">
      <div class="stat-box"><div class="stat-num">300</div><div class="stat-label">Питань</div></div>
      <div class="stat-box"><div class="stat-num">20+</div><div class="stat-label">Тем</div></div>
      <div class="stat-box"><div class="stat-num">B1</div><div class="stat-label">Рівень</div></div>
    </div>
    <div class="mode-grid">
      <button class="btn-mode" onclick="startQuiz(20)"><span class="mode-icon">⚡</span>Швидкий<br><small>20 питань</small></button>
      <button class="btn-mode" onclick="startQuiz(50)"><span class="mode-icon">🎯</span>Тренування<br><small>50 питань</small></button>
      <button class="btn-mode" onclick="startQuiz(100)"><span class="mode-icon">📚</span>Серйозний<br><small>100 питань</small></button>
      <button class="btn-mode" onclick="startQuiz(0)"><span class="mode-icon">🏆</span>Повний<br><small>всі 300</small></button>
    </div>
  </div>

  <div class="screen" id="quizScreen">
    <div class="quiz-header">
      <div class="quiz-counter" id="counter">01 / 20</div>
      <div class="quiz-score"><div class="score-dot"></div><span id="scoreDisplay">0 правильно</span></div>
    </div>
    <div class="progress-bar"><div class="progress-fill" id="progressFill" style="width:0%"></div></div>
    <div class="category-badge" id="categoryBadge">Дієслова</div>
    <div class="question-card">
      <div class="question-de" id="questionDE">...</div>
      <div class="question-ua" id="questionUA">...</div>
    </div>
    <div class="options" id="optionsContainer"></div>
    <div class="feedback-bar" id="feedbackBar"></div>
    <button class="btn btn-primary next-btn" id="nextBtn" onclick="nextQuestion()">Далі →</button>
  </div>

  <div class="screen" id="resultsScreen">
    <div class="result-ring">
      <div class="result-pct" id="resultPct">0%</div>
      <div class="result-label">результат</div>
    </div>
    <h2 id="resultTitle">РЕЗУЛЬТАТ</h2>
    <p class="result-msg" id="resultMsg">...</p>
    <div class="result-grid">
      <div class="result-box"><div class="result-box-num green" id="correctCount">0</div><div class="result-box-label">✅ Правильно</div></div>
      <div class="result-box"><div class="result-box-num red" id="wrongCount">0</div><div class="result-box-label">❌ Неправильно</div></div>
    </div>
    <div class="mode-grid">
      <button class="btn-mode" onclick="startQuiz(20)"><span class="mode-icon">⚡</span>Ще раз<br><small>20 питань</small></button>
      <button class="btn-mode" onclick="startQuiz(50)"><span class="mode-icon">🎯</span>Ще раз<br><small>50 питань</small></button>
      <button class="btn-mode" onclick="startQuiz(100)"><span class="mode-icon">📚</span>Ще раз<br><small>100 питань</small></button>
      <button class="btn-mode" onclick="startQuiz(0)"><span class="mode-icon">🏆</span>Ще раз<br><small>всі 300</small></button>
    </div>
  </div>
</div>

let questions=[], current=0, score=0, answered=false;

function shuffle(arr){
  const a=[...arr];
  for(let i=a.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[a[i],a[j]]=[a[j],a[i]];}
  return a;
}

function startQuiz(n){
  const shuffled=shuffle(ALL_QUESTIONS);
  questions=n>0?shuffled.slice(0,Math.min(n,shuffled.length)):shuffled;
  current=0;score=0;
  showScreen('quizScreen');
  renderQuestion();
}

function showScreen(id){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(id).classList.add('active');
}

function renderQuestion(){
  const q=questions[current], total=questions.length;
  document.getElementById('counter').textContent=String(current+1).padStart(2,'0')+' / '+String(total).padStart(2,'0');
  document.getElementById('scoreDisplay').textContent=score+' правильно';
  document.getElementById('progressFill').style.width=((current/total)*100)+'%';
  document.getElementById('categoryBadge').textContent=q.cat;
  document.getElementById('questionDE').textContent=q.de;
  document.getElementById('questionUA').textContent='('+q.ua+')';
  const container=document.getElementById('optionsContainer');
  container.innerHTML='';
  q.opts.forEach((opt,i)=>{
    const btn=document.createElement('button');
    btn.className='option';
    btn.innerHTML=`<span>${opt}</span>`;
    btn.onclick=()=>selectAnswer(i);
    container.appendChild(btn);
  });
  document.getElementById('feedbackBar').className='feedback-bar';
  document.getElementById('feedbackBar').textContent='';
  document.getElementById('nextBtn').className='btn btn-primary next-btn';
  answered=false;
}

function selectAnswer(idx){
  if(answered)return;
  answered=true;
  const q=questions[current];
  const opts=document.querySelectorAll('.option');
  opts.forEach(btn=>btn.disabled=true);
  const feedback=document.getElementById('feedbackBar');
  if(idx===q.ans){
    opts[idx].classList.add('correct');
    score++;
    feedback.textContent='✅ Правильно!';
    feedback.className='feedback-bar show correct-fb';
  }else{
    opts[idx].classList.add('wrong');
    opts[q.ans].classList.add('correct');
    feedback.textContent='❌ Неправильно! Правильна відповідь: '+q.opts[q.ans];
    feedback.className='feedback-bar show wrong-fb';
  }
  document.getElementById('scoreDisplay').textContent=score+' правильно';
  document.getElementById('nextBtn').className='btn btn-primary next-btn show';
}

function nextQuestion(){
  current++;
  if(current>=questions.length){showResults();}
  else{renderQuestion();}
}

function showResults(){
  const total=questions.length;
  const pct=Math.round((score/total)*100);
  document.getElementById('resultPct').textContent=pct+'%';
  document.getElementById('correctCount').textContent=score;
  document.getElementById('wrongCount').textContent=total-score;
  let title,msg;
  if(pct>=90){title='AUSGEZEICHNET! 🏆';msg='Відмінно! Ти готовий до іспиту B1!';}
  else if(pct>=75){title='SEHR GUT! 🌟';msg='Дуже добре! Ще трохи практики — і ти готовий!';}
  else if(pct>=60){title='GUT! 👍';msg='Непогано! Продовжуй вправлятися.';}
  else if(pct>=40){title='WEITER SO! 💪';msg='Є над чим попрацювати. Не здавайся!';}
  else{title='ÜBEN! 📚';msg='Треба більше практики. Ти зможеш!';}
  document.getElementById('resultTitle').textContent=title;
  document.getElementById('resultMsg').textContent=msg+` (${score} з ${total})`;
  showScreen('resultsScreen');
}
